baseURL = "https://horafly666.github.io/MySite/"
title = "HoraFly"
theme = "PaperMod"
defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = true
enableRobotsTXT = true

[languages]
  [languages.zh]
    languageName = "简体中文"
    weight = 1
    contentDir = "content/zh"

    [languages.zh.params.homeInfoParams]
      Title = "你好 👋"
      Content = """
喜欢读书，玩游戏，最近在学画画和做游戏。

**你可以在这里找到我**
      """

    [languages.zh.menu]
      [[languages.zh.menu.main]]
        identifier = "posts"
        name = "文章"
        url = "/posts/"
        weight = 10

  [languages.en]
    languageName = "English"
    weight = 2
    contentDir = "content/en"

    [languages.en.params.homeInfoParams]
      Title = "Hello 👋"
      Content = "Welcome to my blog"

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = "posts"
        name = "Posts"
        url = "/posts/"
        weight = 10

[params]
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowCodeCopyButtons = true

  [[params.socialIcons]]
    name = "x"
    url = "https://x.com/HoraFly666"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/HoraFly666"

  [[params.socialIcons]]
    name = "bilibili"
    url = "https://space.bilibili.com/1822976941"
